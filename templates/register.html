<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register — SPPS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1A3C5E,#2196F3);
  min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.18);
  width:100%;max-width:420px;padding:40px 36px}
h2{color:#1A3C5E;font-size:22px;font-weight:800;text-align:center;margin-bottom:24px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#1A3C5E;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid #ced4da;
  border-radius:8px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:#2196F3}
.btn{width:100%;padding:12px;border-radius:24px;font-size:15px;font-weight:700;
  border:none;cursor:pointer;background:#28A745;color:#fff;margin-top:4px}
.btn:hover{background:#1e7e34}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px}
.alert-danger{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.link{text-align:center;margin-top:16px;font-size:13px;color:#6c757d}
.link a{color:#2196F3;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <h2>🎓 Create Account</h2>
  {% for cat, msg in get_flashed_messages(with_categories=True) %}
  <div class="alert alert-{{ cat }}">{{ msg }}</div>
  {% endfor %}
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="Your full name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" minlength="6" placeholder="Min 6 characters" required>
    </div>
    <div class="form-group">
      <label>Role</label>
      <select name="role">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
    </div>
    <button class="btn" type="submit">Register</button>
  </form>
  <div class="link">Already have an account? <a href="/login">Log in</a></div>
</div>
</body>
</html>
